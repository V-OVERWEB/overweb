<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Текст с эффектом объёма и перспективы | CSS Only</title>
    <style>
        *, *::before, *::after {
            padding: 0;
            margin: 0 auto;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            height: 100vh;
            display: grid;
            grid-template: repeat(15, 1fr)/repeat(15, 1fr);
            overflow: hidden;
        }

        .cell {
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Все позиции ячеек */
        .cell:nth-child(15n+1):hover ~ .content { --positionX: 0; }
        .cell:nth-child(n+1):nth-child(-n+15):hover ~ .content { --positionY: 0; }
        .cell:nth-child(15n+2):hover ~ .content { --positionX: 1; }
        .cell:nth-child(n+16):nth-child(-n+30):hover ~ .content { --positionY: 1; }
        .cell:nth-child(15n+3):hover ~ .content { --positionX: 2; }
        .cell:nth-child(n+31):nth-child(-n+45):hover ~ .content { --positionY: 2; }
        .cell:nth-child(15n+4):hover ~ .content { --positionX: 3; }
        .cell:nth-child(n+46):nth-child(-n+60):hover ~ .content { --positionY: 3; }
        .cell:nth-child(15n+5):hover ~ .content { --positionX: 4; }
        .cell:nth-child(n+61):nth-child(-n+75):hover ~ .content { --positionY: 4; }
        .cell:nth-child(15n+6):hover ~ .content { --positionX: 5; }
        .cell:nth-child(n+76):nth-child(-n+90):hover ~ .content { --positionY: 5; }
        .cell:nth-child(15n+7):hover ~ .content { --positionX: 6; }
        .cell:nth-child(n+91):nth-child(-n+105):hover ~ .content { --positionY: 6; }
        .cell:nth-child(15n+8):hover ~ .content { --positionX: 7; }
        .cell:nth-child(n+106):nth-child(-n+120):hover ~ .content { --positionY: 7; }
        .cell:nth-child(15n+9):hover ~ .content { --positionX: 8; }
        .cell:nth-child(n+121):nth-child(-n+135):hover ~ .content { --positionY: 8; }
        .cell:nth-child(15n+10):hover ~ .content { --positionX: 9; }
        .cell:nth-child(n+136):nth-child(-n+150):hover ~ .content { --positionY: 9; }
        .cell:nth-child(15n+11):hover ~ .content { --positionX: 10; }
        .cell:nth-child(n+151):nth-child(-n+165):hover ~ .content { --positionY: 10; }
        .cell:nth-child(15n+12):hover ~ .content { --positionX: 11; }
        .cell:nth-child(n+166):nth-child(-n+180):hover ~ .content { --positionY: 11; }
        .cell:nth-child(15n+13):hover ~ .content { --positionX: 12; }
        .cell:nth-child(n+181):nth-child(-n+195):hover ~ .content { --positionY: 12; }
        .cell:nth-child(15n+14):hover ~ .content { --positionX: 13; }
        .cell:nth-child(n+196):nth-child(-n+210):hover ~ .content { --positionY: 13; }
        .cell:nth-child(15n+15):hover ~ .content { --positionX: 14; }
        .cell:nth-child(n+211):nth-child(-n+225):hover ~ .content { --positionY: 14; }

        .content {
            --positionX: 7;
            --positionY: 7;
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .css {
            font-family: 'Poppins', 'Impact', 'Arial Black', sans-serif;
            position: absolute;
            font-weight: 900;
            top: 50%;
            left: 50%;
            animation: color 3s infinite linear;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.5s;
            white-space: nowrap;
            font-size: 150px;
        }
        
        /* УМЕРЕННОЕ РАССТОЯНИЕ МЕЖДУ СЛОЯМИ - идеальный баланс */
        .css:nth-child(1) { 
            animation-delay: 0s; 
            opacity: 0.15;
            transform: translateX(calc(-50% - (var(--positionX) - 7) * 8px)) translateY(calc(-50% - (var(--positionY) - 7) * 8px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1.5deg)) rotateY(calc((var(--positionX) - 7) * 1.5deg)); 
        }
        .css:nth-child(2) { 
            animation-delay: -0.3s; 
            opacity: 0.25;
            transform: translateX(calc(-50% - (var(--positionX) - 7) * 7px)) translateY(calc(-50% - (var(--positionY) - 7) * 7px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1.5deg)) rotateY(calc((var(--positionX) - 7) * 1.5deg)); 
        }
        .css:nth-child(3) { 
            animation-delay: -0.6s; 
            opacity: 0.35;
            transform: translateX(calc(-50% - (var(--positionX) - 7) * 6px)) translateY(calc(-50% - (var(--positionY) - 7) * 6px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1.5deg)) rotateY(calc((var(--positionX) - 7) * 1.5deg)); 
        }
        .css:nth-child(4) { 
            animation-delay: -0.9s; 
            opacity: 0.45;
            transform: translateX(calc(-50% - (var(--positionX) - 7) * 5px)) translateY(calc(-50% - (var(--positionY) - 7) * 5px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1.5deg)) rotateY(calc((var(--positionX) - 7) * 1.5deg)); 
        }
        .css:nth-child(5) { 
            animation-delay: -1.2s; 
            opacity: 0.55;
            transform: translateX(calc(-50% - (var(--positionX) - 7) * 4px)) translateY(calc(-50% - (var(--positionY) - 7) * 4px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1.5deg)) rotateY(calc((var(--positionX) - 7) * 1.5deg)); 
        }
        .css:nth-child(6) { 
            animation-delay: -1.5s; 
            opacity: 0.65;
            transform: translateX(calc(-50% - (var(--positionX) - 7) * 3px)) translateY(calc(-50% - (var(--positionY) - 7) * 3px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1.5deg)) rotateY(calc((var(--positionX) - 7) * 1.5deg)); 
        }
        .css:nth-child(7) { 
            animation-delay: -1.8s; 
            opacity: 0.75;
            transform: translateX(calc(-50% - (var(--positionX) - 7) * 2px)) translateY(calc(-50% - (var(--positionY) - 7) * 2px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1.5deg)) rotateY(calc((var(--positionX) - 7) * 1.5deg)); 
        }
        .css:nth-child(8) { 
            animation-delay: -2.1s; 
            opacity: 0.85;
            transform: translateX(calc(-50% - (var(--positionX) - 7) * 1px)) translateY(calc(-50% - (var(--positionY) - 7) * 1px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1.5deg)) rotateY(calc((var(--positionX) - 7) * 1.5deg)); 
        }
        .css:nth-child(9) { 
            animation-delay: -2.4s; 
            opacity: 0.93;
            transform: translateX(calc(-50% - (var(--positionX) - 7) * 0.5px)) translateY(calc(-50% - (var(--positionY) - 7) * 0.5px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1.5deg)) rotateY(calc((var(--positionX) - 7) * 1.5deg)); 
        }
        .css:nth-child(10) { 
            animation-delay: -2.7s; 
            opacity: 1;
            transform: translateX(calc(-50% - (var(--positionX) - 7) * 0px)) translateY(calc(-50% - (var(--positionY) - 7) * 0px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1.5deg)) rotateY(calc((var(--positionX) - 7) * 1.5deg)); 
        }
        
        @keyframes color {
            0% { color: hsl(0, 75%, 65%); }
            10% { color: hsl(36, 75%, 65%); }
            20% { color: hsl(72, 75%, 65%); }
            30% { color: hsl(108, 75%, 65%); }
            40% { color: hsl(144, 75%, 65%); }
            50% { color: hsl(180, 75%, 65%); }
            60% { color: hsl(216, 75%, 65%); }
            70% { color: hsl(252, 75%, 65%); }
            80% { color: hsl(288, 75%, 65%); }
            90% { color: hsl(324, 75%, 65%); }
            100% { color: hsl(0, 75%, 65%); }
        }

        /* Адаптация для мобильных */
        @media (max-width: 700px) {
            .css {
                font-size: 80px;
            }
            .css:nth-child(1) { transform: translateX(calc(-50% - (var(--positionX) - 7) * 5px)) translateY(calc(-50% - (var(--positionY) - 7) * 5px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1deg)) rotateY(calc((var(--positionX) - 7) * 1deg)); }
            .css:nth-child(2) { transform: translateX(calc(-50% - (var(--positionX) - 7) * 4.4px)) translateY(calc(-50% - (var(--positionY) - 7) * 4.4px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1deg)) rotateY(calc((var(--positionX) - 7) * 1deg)); }
            .css:nth-child(3) { transform: translateX(calc(-50% - (var(--positionX) - 7) * 3.8px)) translateY(calc(-50% - (var(--positionY) - 7) * 3.8px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1deg)) rotateY(calc((var(--positionX) - 7) * 1deg)); }
            .css:nth-child(4) { transform: translateX(calc(-50% - (var(--positionX) - 7) * 3.2px)) translateY(calc(-50% - (var(--positionY) - 7) * 3.2px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1deg)) rotateY(calc((var(--positionX) - 7) * 1deg)); }
            .css:nth-child(5) { transform: translateX(calc(-50% - (var(--positionX) - 7) * 2.6px)) translateY(calc(-50% - (var(--positionY) - 7) * 2.6px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1deg)) rotateY(calc((var(--positionX) - 7) * 1deg)); }
            .css:nth-child(6) { transform: translateX(calc(-50% - (var(--positionX) - 7) * 2px)) translateY(calc(-50% - (var(--positionY) - 7) * 2px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1deg)) rotateY(calc((var(--positionX) - 7) * 1deg)); }
            .css:nth-child(7) { transform: translateX(calc(-50% - (var(--positionX) - 7) * 1.4px)) translateY(calc(-50% - (var(--positionY) - 7) * 1.4px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1deg)) rotateY(calc((var(--positionX) - 7) * 1deg)); }
            .css:nth-child(8) { transform: translateX(calc(-50% - (var(--positionX) - 7) * 0.8px)) translateY(calc(-50% - (var(--positionY) - 7) * 0.8px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1deg)) rotateY(calc((var(--positionX) - 7) * 1deg)); }
            .css:nth-child(9) { transform: translateX(calc(-50% - (var(--positionX) - 7) * 0.3px)) translateY(calc(-50% - (var(--positionY) - 7) * 0.3px)) rotateX(calc(0deg - (var(--positionY) - 7) * 1deg)) rotateY(calc((var(--positionX) - 7) * 1deg)); }
        }
        
        @media (max-width: 500px) {
            .css {
                font-size: 50px;
            }
        }
    </style>
</head>
