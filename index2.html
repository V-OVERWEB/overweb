<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Matrix Overweb</title>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #021a0b 0%, #000000 100%);
            min-height: 100vh;
            font-family: 'Righteous', 'Courier New', monospace;
            overflow-x: hidden;
        }

        /* блок .block__first — полноэкранный контейнер */
        .block__first {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: transparent;
            overflow: hidden;
            position: relative;
        }

        /* ===== НЕОНОВЫЕ КОЛЬЦА + МАТРИЧНЫЕ СИМВОЛЫ ===== */
        .neon {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* основной текст */
        .neon__name {
            color: #dbffe4;
            font-size: 160px;
            font-weight: 700;
            font-family: "Righteous", monospace;
            display: flex;
            scale: 0.85;
            justify-content: center;
            align-items: center;
            animation: neonFlicker 3s ease-in-out infinite;
            z-index: 20;
            letter-spacing: 8px;
        }

        .neon__name span {
            text-shadow: 0px 0px 20px #9bcca7;
            transition: all 0.2s;
        }

        /* ----- МАТРИЧНЫЕ КОЛЬЦА (новые слои с кодами) ----- */
        .matrix-ring {
            position: absolute;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            white-space: pre;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: rgba(50, 255, 100, 0.25);
            text-shadow: 0 0 5px #0f0, 0 0 2px #0f0;
            z-index: 5;
            overflow: hidden;
        }

        /* вращающиеся строки кода */
        .matrix-ring--big-code {
            width: min(92vw, 600px);
            height: min(92vw, 600px);
            font-size: 14px;
            animation: ringRotateMatrix 25s infinite linear;
            background: repeating-radial-gradient(circle at 30% 40%, rgba(0, 30, 0, 0.2), rgba(0, 20, 0, 0.6) 80px);
            backdrop-filter: blur(1px);
            border: 1px solid rgba(0, 255, 100, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2), inset 0 0 30px rgba(0, 255, 0, 0.1);
        }

        .matrix-ring--medium-code {
            width: min(78vw, 500px);
            height: min(78vw, 500px);
            font-size: 11px;
            animation: ringRotateMatrixRev 22s infinite linear;
            background: radial-gradient(circle, rgba(0,20,0,0.3), rgba(0,0,0,0.7));
            border: 1px dashed rgba(100, 255, 150, 0.5);
        }

        .matrix-ring--small-code {
            width: min(55vw, 400px);
            height: min(55vw, 400px);
            font-size: 9px;
            animation: ringRotateMatrix 19s infinite linear reverse;
            background: repeating-linear-gradient(45deg, rgba(0,40,0,0.2), rgba(0,70,0,0.2) 15px);
            border: 1px dotted rgba(0, 255, 150, 0.6);
        }

        /* лента символов внутри колец (псевдоэлементы с кодом) */
        .matrix-ring::before {
            content: attr(data-code);
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            text-align: center;
            transform: translate(-50%, -50%) rotate(0deg);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #0f8b3c;
            opacity: 0.65;
            text-shadow: 0 0 3px #2eff7a;
            white-space: normal;
            word-break: break-word;
            padding: 20px;
            line-height: 1.5;
            letter-spacing: 2px;
        }

        /* для более плотного эффекта кода добавляем дополнительный слой */
        .matrix-ring--big-code::after {
            content: "01001101 01100001 01110100 01110010 01101001 01111000";
            position: absolute;
            bottom: 15%;
            left: 10%;
            font-size: 8px;
            color: #2eff8c44;
            white-space: pre;
            font-family: monospace;
            transform: rotate(-12deg);
        }

        /* оригинальные неон-кольца (оставляем, но делаем их более прозрачными) */
        .neon__ring {
            position: absolute;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pulseRing 4s infinite alternate;
            z-index: 2;
        }

        .neon__ring--big {
            width: min(85vw, 540px);
            height: min(85vw, 540px);
            border: 6px solid rgba(100, 255, 150, 0.7);
            box-shadow: 0 0 30px 15px rgba(0, 210, 100, 0.5), 0 0 30px 15px rgba(0, 210, 100, 0.5) inset;
            animation: ringRotate 24s infinite linear, ringFlicker 3s ease-in-out infinite;
            background: rgba(0, 30, 10, 0.2);
        }

        .neon__ring--medium {
            width: min(72vw, 450px);
            height: min(72vw, 450px);
            border: 4.5px solid rgb(180, 255, 200);
            box-shadow: 0 0 32px 18px rgba(0, 210, 110, 0.6), 0 0 32px 18px rgba(0, 210, 110, 0.6) inset;
            animation: ringRotateRev 20s infinite linear, ringFlicker 3.2s ease-in-out infinite;
            background: rgba(0, 20, 0, 0.15);
        }

        .neon__ring--small {
            width: min(45vw, 350px);
            height: min(45vw, 350px);
            border: 3px solid #ccffe0;
            box-shadow: 0 0 38px 20px rgba(0, 210, 120, 0.65), 0 0 38px 20px rgba(0, 210, 120, 0.65) inset;
            animation: ringRotate 18s infinite linear reverse, ringFlicker 2.8s ease-in-out infinite;
            background: rgba(0, 40, 5, 0.2);
        }

        /* ===== МАТРИЧНЫЙ ДОЖДЬ (canvas) ===== */
        .matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.35;
        }

        /* Particles (существующие) доработаны под матричный стиль */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 12;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, #2eff7a, #0a6b2f);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1px);
            animation: float3d var(--duration, 8s) infinite ease-in-out;
            animation-delay: var(--delay, 0s);
            opacity: var(--opacity, 0.6);
            width: var(--size, 4px);
            height: var(--size, 4px);
            box-shadow: 0 0 var(--glow, 8px) #2eff7a;
        }

        .particle--glow {
            background: radial-gradient(circle, #00ff88, #006633);
            filter: blur(2px);
            box-shadow: 0 0 var(--glow, 15px) #00ffaa;
        }

        @keyframes float3d {
            0% { transform: translate3d(0, 0, 0) scale(1); opacity: var(--opacity, 0.7);}
            25% { transform: translate3d(calc(var(--x, 50) * 1px), calc(var(--y, -50) * 1px), calc(var(--z, 30) * 1px)) scale(1.2); opacity: 0.9;}
            50% { transform: translate3d(calc(var(--x, 100) * 1px), calc(var(--y, 0) * 1px), calc(var(--z, -20) * 1px)) scale(0.8); opacity: 0.5;}
            75% { transform: translate3d(calc(var(--x, 50) * 1px), calc(var(--y, 50) * 1px), calc(var(--z, 40) * 1px)) scale(1.1); opacity: 0.8;}
            100% { transform: translate3d(0, 0, 0) scale(1); opacity: var(--opacity, 0.7);}
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.3; filter: blur(3px);}
            50% { opacity: 1; filter: blur(0px);}
        }

        .particle--sparkle {
            animation: float3d var(--duration, 10s) infinite ease-in-out, sparkle 2s infinite alternate;
        }

        /* TV effect с зелёным оттенком */
        .tv-effect::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 50% 50%, rgba(0,20,0,0.5), rgba(40,255,40,0.08) 0.00085px);
            pointer-events: none;
            animation: static-move 0.2s infinite;
            mask-image: radial-gradient(circle at center, rgb(0 0 0 / 63%) 60%, transparent 95%);
            z-index: 13;
        }

        .tv-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1c3f1a;
            pointer-events: none;
            mix-blend-mode: multiply;
            mask-image: radial-gradient(circle at center, black 60%, transparent 95%);
            z-index: 13;
            opacity: 0.2;
        }

        @keyframes static-move {
            100% { background-size: 200% 200%; opacity: 1; }
        }

        /* АНИМАЦИИ колец */
        @keyframes ringRotate {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes ringRotateRev {
            100% { transform: translate(-50%, -50%) rotate(-360deg); }
        }
        @keyframes ringRotateMatrix {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes ringRotateMatrixRev {
            100% { transform: translate(-50%, -50%) rotate(-360deg); }
        }
        @keyframes pulseRing {
            100% { transform: translate(-50%, -50%) scale(1.02); }
        }

        @keyframes neonFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 1; }
            90.0% { opacity: 1; }
            90.2% { opacity: 0.05; }
            90.45% { opacity: 0.03; }
            90.7% { opacity: 1; }
            91.9% { opacity: 1; }
            92.0% { opacity: 0.05; }
            92.2% { opacity: 0.02; }
            92.35% { opacity: 1; }
        }

        @keyframes ringFlicker {
            0%, 100% { opacity: 1; border-color: rgba(224, 255, 234, 0.9);}
            50% { opacity: 0.88; border-color: rgba(231, 255, 238, 0.9);}
            90.0% { opacity: 1; }
            90.2% { opacity: 0.05; }
            90.45% { opacity: 0.03; }
            90.7% { opacity: 1; }
            91.9% { opacity: 1; }
            92.0% { opacity: 0.05; }
            92.2% { opacity: 0.02; }
            92.35% { opacity: 1; }
        }

        /* ТЕНИ БУКВ (усиленные белым свечением) */
        .neon__name span:nth-child(1) { text-shadow: 0px 0px 20px #9bcca7, 0px 0px 20px #9bcca7, 21px 0px 0px #9bcca7, 19px 0px 0px #9bcca7, 14px 0px 0px #9bcca7, 0px 0px 60px rgba(255, 255, 255, 0.9), 0px 0px 90px rgba(255, 255, 255, 0.6), 0px 0px 120px rgba(255, 255, 255, 0.3); z-index: 2; }
        .neon__name span:nth-child(2) { text-shadow: 0px 0px 20px #9bcca7, 0px 0px 20px #9bcca7, 16px 0px 0px #9bcca7, 10px 0px 0px #9bcca7, 4px 0px 0px #9bcca7, 0px 0px 50px rgba(255, 255, 255, 0.9), 0px 0px 80px rgba(255, 255, 255, 0.6), 0px 0px 110px rgba(255, 255, 255, 0.3); font-size: 170px; }
        .neon__name span:nth-child(3) { text-shadow: 0px 0px 20px #9bcca7, 0px 0px 20px #9bcca7, 10px 0px 0px #9bcca7, 5px 0px 0px #9bcca7, 0px 0px 55px rgba(255, 255, 255, 0.9), 0px 0px 85px rgba(255, 255, 255, 0.6), 0px 0px 115px rgba(255, 255, 255, 0.3); font-size: 175px; }
        .neon__name span:nth-child(4) { text-shadow: 0px 0px 20px #9bcca7, 0px 0px 20px #9bcca7, -4px 0px 0px #9bcca7, 0px 0px 45px rgba(255, 255, 255, 0.9), 0px 0px 75px rgba(255, 255, 255, 0.6), 0px 0px 105px rgba(255, 255, 255, 0.3); font-size: 180px; }
        .neon__name span:nth-child(5) { text-shadow: 0px 0px 20px #9bcca7, 0px 0px 20px #9bcca7,-10px 0px 0px #9bcca7, -5px 0px 0px #9bcca7, 0px 0px 60px rgba(255, 255, 255, 0.9), 0px 0px 90px rgba(255, 255, 255, 0.6), 0px 0px 120px rgba(255, 255, 255, 0.3); font-size: 175px; }
        .neon__name span:nth-child(6) { text-shadow: 0px 0px 20px #9bcca7, 0px 0px 20px #9bcca7, -16px 0px 0px #9bcca7, -10px 0px 0px #9bcca7, -4px 0px 0px #9bcca7, 0px 0px 50px rgba(255, 255, 255, 0.9), 0px 0px 80px rgba(255, 255, 255, 0.6), 0px 0px 110px rgba(255, 255, 255, 0.3); font-size: 170px; }
        .neon__name span:nth-child(7) { text-shadow: 0px 0px 20px #9bcca7, 0px 0px 20px #9bcca7, -21px 0px 0px #9bcca7, -19px 0px 0px #9bcca7, -14px 0px 0px #9bcca7, 0px 0px 60px rgba(255, 255, 255, 0.9), 0px 0px 90px rgba(255, 255, 255, 0.6), 0px 0px 120px rgba(255, 255, 255, 0.3); z-index: 2; }

        @media (max-width: 768px) { .neon__name { scale: 0.7; } .matrix-ring--big-code { font-size: 8px; } }
        @media (max-width: 500px) { .neon__name { scale: 0.5; } }
    </style>
</head>
<body>
<div class="block block__first">
    <div class="neon">
        <!-- оригинальные неон кольца -->
        <div class="neon__ring neon__ring--big"></div>
        <div class="neon__ring neon__ring--medium"></div>
        <div class="neon__ring neon__ring--small"></div>

        <!-- МАТРИЧНЫЕ КОЛЬЦА С БИНАРНЫМ КОДОМ И СИМВОЛАМИ -->
        <div class="matrix-ring matrix-ring--big-code" data-code="10110 01101 11010 00111 10001 01011 11100 10101 01110 11001"></div>
        <div class="matrix-ring matrix-ring--medium-code" data-code="&lt;MATRIX&gt; 0x7F 0x9E 0x3C || 01001001 01101110 01101001 01110100"></div>
        <div class="matrix-ring matrix-ring--small-code" data-code="~ $#@ %^ &amp;* 0101 1010 1110 0001 1001 || ЗАГРУЗКА..."></div>

        <!-- основной текст OVERWEB -->
        <div class="neon__name"><span>O</span><span>V</span><span>E</span><span>R</span><span>W</span><span>E</span><span>B</span></div>
    </div>

    <!-- Контейнер партиклов (звездная пыль в стиле киберпанк) -->
    <div class="particles"></div>
    <!-- Эффект ТВ искажения -->
    <div class="tv-effect"></div>
</div>

<!-- Canvas для МАТРИЧНОГО ДОЖДЯ (классический эффект падающих символов) -->
<canvas id="matrixCanvas" class="matrix-canvas"></canvas>

<script>
    // ---------- 1) ГЕНЕРАЦИЯ ПАРТИКЛОВ (3D-эффект) ----------
    const particlesContainer = document.querySelector('.particles');
    const PARTICLE_COUNT = 150;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * 6 + 2;
        const posX = Math.random() * 100;
        const posY = Math.random() * 100;
        const duration = 7 + Math.random() * 15;
        const delay = Math.random() * 10;
        const xMove = (Math.random() - 0.5) * 180;
        const yMove = (Math.random() - 0.5) * 180;
        const zMove = (Math.random() - 0.5) * 90;
        const opacity = 0.3 + Math.random() * 0.7;
        const glow = 5 + Math.random() * 12;
        
        particle.style.setProperty('--size', size + 'px');
        particle.style.setProperty('--duration', duration + 's');
        particle.style.setProperty('--delay', delay + 's');
        particle.style.setProperty('--x', xMove);
        particle.style.setProperty('--y', yMove);
        particle.style.setProperty('--z', zMove);
        particle.style.setProperty('--opacity', opacity);
        particle.style.setProperty('--glow', glow + 'px');
        particle.style.left = posX + '%';
        particle.style.top = posY + '%';
        
        if (Math.random() > 0.7) particle.classList.add('particle--glow');
        if (Math.random() > 0.85) particle.classList.add('particle--sparkle');
        
        particlesContainer.appendChild(particle);
    }

    // ---------- 2) МАТРИЧНЫЙ ДОЖДЬ (canvas анимация) ----------
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    
    let width = window.innerWidth;
    let height = window.innerHeight;
    
    canvas.width = width;
    canvas.height = height;
    
    // Символы для матрицы (расширенный набор: katakana, цифры, буквы, бинарные символы)
    const matrixChars = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789!@#$%^&*()_+[]{};:<>?ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz01";
    const charsArray = matrixChars.split('');
    
    const fontSize = 18;
    let columns = Math.floor(width / fontSize);
    let drops = [];
    
    // Инициализация капель (каждый столбец со случайной высотой)
    for (let i = 0; i < columns; i++) {
        drops[i] = Math.floor(Math.random() * -height);
    }
    
    function drawMatrix() {
        // Полупрозрачный черный фон для создания эффекта "хвостов"
        ctx.fillStyle = 'rgba(0, 0, 0, 0.045)';
        ctx.fillRect(0, 0, width, height);
        
        ctx.fillStyle = '#2eff7a';
        ctx.font = fontSize + 'px "Courier New", monospace';
        ctx.shadowBlur = 0;
        ctx.shadowColor = '#0f0';
        
        for (let i = 0; i < drops.length; i++) {
            // Случайный символ из набора
            const char = charsArray[Math.floor(Math.random() * charsArray.length)];
            const x = i * fontSize;
            const y = drops[i] * fontSize;
            
            // Яркость ближе к верху ярче
            if (y < height && y > 0) {
                const brightness = Math.min(1, (y / height) * 1.5);
                const gVal = 100 + Math.floor(155 * brightness);
                ctx.fillStyle = `rgb(50, ${gVal}, 70)`;
                ctx.fillText(char, x, y);
                // Добавляем яркую каплю на вершине
                if (drops[i] === Math.floor(drops[i]) && Math.random() > 0.975) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(char, x, y);
                }
            } else {
                ctx.fillStyle = '#1a7a3a';
                ctx.fillText(char, x, y);
            }
            
            // Сдвиг капли вниз с разной скоростью
            if (y > height && Math.random() > 0.98) {
                drops[i] = 0;
            }
            drops[i] += 0.6 + Math.random() * 0.8;
        }
        
        requestAnimationFrame(drawMatrix);
    }
    
    drawMatrix();
    
    // Адаптация canvas под изменение размера окна
    window.addEventListener('resize', () => {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        columns = Math.floor(width / fontSize);
        drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.floor(Math.random() * -height);
        }
    });
    
    // ---------- 3) ДОПОЛНИТЕЛЬНЫЙ ЭФФЕКТ:  МАТРИЧНЫЕ "ГЛИТЧИ" НАД ТЕКСТОМ ----------
    // Добавим случайную анимацию искажения для букв OVERWEB (имитация матричного глитча)
    const nameSpans = document.querySelectorAll('.neon__name span');
    function applyMatrixGlitch() {
        setInterval(() => {
            if (Math.random() > 0.85) {
                const randomSpan = nameSpans[Math.floor(Math.random() * nameSpans.length)];
                const originalText = randomSpan.innerText;
                const glitchChar = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                randomSpan.style.transition = '0.05s';
                randomSpan.innerText = glitchChar;
                setTimeout(() => {
                    randomSpan.innerText = originalText;
                }, 70);
            }
            // дополнительно: эффект смещения тени
            if (Math.random() > 0.92) {
                const title = document.querySelector('.neon__name');
                title.style.transform = `translate(${Math.random() * 4 - 2}px, ${Math.random() * 4 - 2}px)`;
                setTimeout(() => {
                    title.style.transform = '';
                }, 60);
            }
        }, 800);
    }
    applyMatrixGlitch();
    
    // ---------- 4) МЕРЦАНИЕ ЗНАЧКОВ В МАТРИЧНЫХ КОЛЬЦАХ (динамическое обновление data-code) ----------
    const matrixRings = document.querySelectorAll('.matrix-ring');
    const randomCodeStrings = [
        "01001101 01100001 01110100 01110010 01101001 01111000", 
        "10101110 01101011 01101111 01100100 01100101", 
        ">_ SYSTEM ONLINE _< 0xF0 0x9C 0x3A", 
        "01101001 01101110 01101001 01110100 00100000 01101101 01100001 01110100 01110010 01101001 01111000",
        "ЗАЩИТА ПЕРЕГРУЖЕНА", 
        "%% 10011100 00110101 11010110 %%", 
        "WAKE UP NEO...", 
        "МАТРИЦА ПЕРЕЗАПУСК", 
        "101010 111100 001111 100101"
    ];
    
    function updateRingCode() {
        matrixRings.forEach(ring => {
            if (Math.random() > 0.7) {
                let newCode = randomCodeStrings[Math.floor(Math.random() * randomCodeStrings.length)];
                // добавляем случайные символы в конец или начало для разнообразия
                if (Math.random() > 0.5) newCode += " " + Math.floor(Math.random() * 9999).toString(16);
                ring.setAttribute('data-code', newCode);
            }
        });
        setTimeout(updateRingCode, 2800 + Math.random() * 2000);
    }
    updateRingCode();
    
    // 5) добавляем несколько "бинарных искр" — маленькие элементы, парящие между колец
    const extraGlow = document.createElement('div');
    extraGlow.style.position = 'absolute';
    extraGlow.style.width = '100%';
    extraGlow.style.height = '100%';
    extraGlow.style.top = 0;
    extraGlow.style.left = 0;
    extraGlow.style.pointerEvents = 'none';
    extraGlow.style.zIndex = '15';
    document.querySelector('.block__first').appendChild(extraGlow);
    
    for (let i = 0; i < 60; i++) {
        const bit = document.createElement('div');
        bit.innerText = Math.random() > 0.5 ? '1' : '0';
        bit.style.position = 'absolute';

        bit.style.fontSize = (Math.random() * 14 + 10) + 'px';

        bit.style.top = Math.random() * 100 + '%';
        bit.style.left = Math.random() * 100 + '%';
        bit.style.opacity = 0.5;

        bit.style.textShadow = '0 0 4px #0f0';

        bit.style.setProperty('--x', (Math.random() - 0.5) * 200);
        bit.style.setProperty('--y', (Math.random() - 0.5) * 200);
        bit.style.setProperty('--z', (Math.random() - 0.5) * 100);
